<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apólice System SAAS</title>
    
    <link rel="icon" href="assets/logo.png" type="image/png">
    
    <meta http-equiv="Content-Security-Policy" 
    content="default-src * 'self' blob: data: gap:; 
    style-src * 'self' 'unsafe-inline' blob: data: gap:; 
    script-src * 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net blob: data: gap:; 
    connect-src 'self' http://localhost:3000 https://seguradoraproject.onrender.com * 'unsafe-inline' blob: data: gap:;">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/config.js"></script>

    <style>
        /* Reset básico e tipografia */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Container Principal Split Screen */
        .split-container {
            display: flex;
            min-height: 100vh;
            width: 100vw;
        }

        /* === LADO ESQUERDO: MARKETING (60%) === */
        .marketing-side {
            flex: 6; /* 60% */
            background: linear-gradient(135deg, #0e2a21 0%, #4CB191 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            color: white;
            position: relative;
        }

        /* Efeito sutil de brilho/padrão no fundo (opcional) */
        .marketing-side::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .marketing-logo {
            max-width: 200px;
            margin-bottom: 40px;
            z-index: 1;
            /* Filtro para deixar o logo branco, caso ele seja escuro. 
               Remova a linha abaixo se o logo já for claro/colorido e ficar bom no fundo. */
            /* filter: brightness(0) invert(1); */
        }

        .marketing-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
            z-index: 1;
        }

        .marketing-subtitle {
            font-size: 1.2rem;
            max-width: 80%;
            line-height: 1.6;
            opacity: 0.9;
            z-index: 1;
        }

        /* === LADO DIREITO: LOGIN (40%) === */
        .login-side {
            flex: 4; /* 40% */
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            text-align: center;
            /* Removemos a borda e sombra pesada pois a tela dividida já dá a hierarquia visual */
        }

        .login-title { 
            color: #0e2a21; /* Verde escuro para combinar */
            font-size: 24px; 
            margin-bottom: 40px; 
            font-weight: 700; 
        }

        .input-group { 
            position: relative; 
            margin-bottom: 20px; 
            text-align: left; 
        }
        
        .input-group i { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            left: 15px; 
            color: #888; 
            font-size: 14px; 
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 45px; /* Mais preenchimento para visual limpo */
            border: 1px solid #e0e0e0;
            background-color: #f8fbf9; /* Fundo cinza bem claro/esverdeado */
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            color: #333;
        }

        .input-group input:focus { 
            border-color: #4CB191; 
            background-color: #ffffff;
            outline: none; 
            box-shadow: 0 0 0 3px rgba(76, 177, 145, 0.15);
        }

        .btn-login {
            background-color: #4CB191; /* Verde do cliente */
            color: white;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }
        
        .btn-login:hover { 
            background-color: #3a9678; /* Tom mais escuro para hover */
        }
        
        .forgot-link {
            display: inline-block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .forgot-link:hover {
            color: #4CB191;
            text-decoration: underline;
        }

        .footer-text { 
            margin-top: 40px; 
            font-size: 12px; 
            color: #aaa; 
            line-height: 1.5;
        }

        /* === RESPONSIVIDADE PARA CELULARES === */
        @media (max-width: 900px) {
            .split-container {
                flex-direction: column;
            }
            .marketing-side {
                flex: none;
                padding: 60px 20px;
            }
            .marketing-title {
                font-size: 2rem;
            }
            .login-side {
                flex: 1;
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="split-container">
        <div class="marketing-side">
            <img src="assets/logo.png" alt="Logo Apólice System" class="marketing-logo">
            <h1 class="marketing-title">O Futuro da Gestão de Clientes e Apólices</h1>
            <p class="marketing-subtitle">
                Gerencie apólices, clientes e comissões em um único lugar, de forma rápida, segura e escalável.
            </p>
        </div>

        <div class="login-side">
            <div class="login-card">
                <h2 class="login-title">Acesse sua Conta</h2>
                
                <form id="form-login">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="E-mail Corporativo" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="senha" placeholder="Sua Senha" required>
                    </div>

                    <button type="submit" class="btn-login">ENTRAR</button>
                </form>        
                
                <a href="recuperar.html" class="forgot-link">Esqueci minha senha</a>

                <p class="footer-text">
                    &copy; 2026 Gestão de Clientes e Apólices.<br>
                    Todos os direitos reservados ASL TECH Áidano Lima.
                </p>
            </div>
        </div>
    </div>

    <script>
        // --- CORREÇÃO DO ERRO API_URL ---
        const BASE_API = (typeof API_URL !== 'undefined') ? API_URL : window.location.origin;

        // Verifica se já está logado e redireciona
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const btn = document.querySelector('.btn-login');
            const originalText = btn.innerText;

            if(!email || !senha) {
                Swal.fire('Atenção', 'Preencha todos os campos.', 'warning');
                return;
            }

            try {
                // Estado de Carregamento
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Validando...';
                btn.disabled = true;
                btn.style.opacity = '0.7';

                console.log("Tentando login em:", `${BASE_API}/login`);

                const response = await fetch(`${BASE_API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const data = await response.json(); 

                if (response.ok) {
                    // Login Sucesso: Salva tudo
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('usuario_logado', data.usuario.nome);
                    localStorage.setItem('tipo_usuario', data.usuario.tipo);
                    
                    // Feedback Visual Rápido
                    const Toast = Swal.mixin({
                        toast: true, position: 'top-end', showConfirmButton: false, timer: 1000
                    });
                    
                    await Toast.fire({ icon: 'success', title: 'Login realizado!' });
                    
                    // Redireciona
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error(data.message || 'Dados inválidos');
                }
            } catch (error) {
                console.error("Erro Login:", error);
                
                let msg = error.message;
                if (msg.includes('Unexpected token') || msg.includes('JSON')) {
                    msg = "Erro de conexão com o servidor. Verifique se o Backend está rodando.";
                }

                Swal.fire({ 
                    icon: 'error', 
                    title: 'Acesso Negado', 
                    text: msg,
                    confirmButtonColor: '#4CB191' /* Cor do botão do alerta combinando com o tema */
                });
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
