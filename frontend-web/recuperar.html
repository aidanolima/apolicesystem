<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Acesso | Seguradora</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body.login-body { background-color: #f4f6f8; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .login-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-enviar { width: 100%; padding: 12px; background-color: #2e7d32; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-enviar:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <div style="font-size: 48px; color: #2e7d32; margin-bottom: 10px;"><i class="fas fa-lock"></i></div>
        <h1>Recuperação de Senha</h1>
        <p style="color: #666; margin-bottom: 25px;">Informe o e-mail da sua conta para receber as instruções.</p>

        <form id="form-recuperar">
            <div class="form-group">
                <label>E-mail Cadastrado</label>
                <input type="email" id="email_input" placeholder="seu.email@exemplo.com" required>
            </div>
            <button type="submit" id="btn-submit" class="btn-enviar">Enviar Instruções</button>
        </form>

        <div style="margin-top: 20px;"><a href="index.html" style="text-decoration: none; color: #1976d2;"><i class="fas fa-arrow-left"></i> Voltar para o Login</a></div>
    </div>

    <script src="js/config.js"></script>
    <script>
        document.getElementById('form-recuperar').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email_input').value.trim();
            const btn = document.getElementById('btn-submit');

            // Feedback visual
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';

            console.log("Tentando conectar em:", `${API_URL}/forgot-password`);

            try {
                const response = await fetch(`${API_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const result = await response.json();

                if (response.ok) {
                    Swal.fire('Sucesso!', 'E-mail enviado! Verifique sua caixa de entrada e SPAM.', 'success');
                } else {
                    Swal.fire('Atenção', result.message || 'Erro ao processar.', 'warning');
                }
            } catch (error) {
                console.error("Erro na chamada:", error);
                Swal.fire('Erro técnico', 'O servidor não respondeu. Verifique se o Render está online.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Enviar Instruções';
            }
        });
    </script>
</body>
</html>
