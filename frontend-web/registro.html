<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="js/config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuário</title>
    
    <meta http-equiv="Content-Security-Policy" 
    content="default-src * 'self' blob: data: gap:; 
    style-src * 'self' 'unsafe-inline' blob: data: gap:; 
    script-src * 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net blob: data: gap:; 
    connect-src 'self' http://localhost:10000 http://localhost:3000 https://apolicesystem.onrender.com * 'unsafe-inline' blob: data: gap:;">
    
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        /* --- CORREÇÃO DEFINITIVA DO LOGO NO HEADER --- */
        .header-brand, .header-brand a {
            display: flex !important;
            align-items: center !important;
            height: 100% !important;
            background: transparent !important; /* Garante que não há fundo branco atrás */
        }
        
        .header-logo {
            height: 50px !important; 
            width: auto !important;
            border-radius: 0 !important; 
            background: transparent !important; 
            object-fit: contain !important;
            margin-left: 15px !important;
            padding: 0 !important; 
            
            /* A MÁGICA QUE REMOVE O "EFEITO FANTASMA" BRANCO */
            filter: none !important;
            -webkit-filter: none !important;
            mix-blend-mode: normal !important;
            box-shadow: none !important;
        }
        .loading { color: #666; font-style: italic; }
        .btn-processar { background-color: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-processar:hover { background-color: #1b5e20; }
        .btn-salvar { width: 100%; margin-top: 20px; padding: 15px; background-color: #1976d2; color: white; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn-salvar:hover { background-color: #1565c0; }
        .upload-container { background-color: #e3f2fd; border: 2px dashed #1976d2; padding: 20px; border-radius: 8px; margin-top: 15px; text-align: center; }
        #status-pdf { font-weight: bold; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body class="dashboard-body">

    <header class="app-header">
        <div class="header-brand"><a href="dashboard.html"><img src="assets/logo.png" alt="Logo" class="header-logo"></a></div>
        <nav class="header-nav">
            <a href="dashboard.html" class="header-link">DASHBOARD</a>
            <a href="apolice.html" class="header-link">APÓLICES</a>
            <a href="registro.html" class="header-link active">USUÁRIOS</a>
            <a href="relatorios.html" class="header-link">RELATÓRIOS</a>
        </nav>
        <div class="header-user-area">
            <div class="user-info"><span class="user-name">Olá, <strong id="user-name-display">...</strong></span></div>
            <button id="btn-logout" class="btn-logout-panel">SAIR</button>
        </div>
    </header>

    <div class="main-container">
        <div style="margin-bottom: 20px;">
            <a href="dashboard.html" style="text-decoration: none; color: #666; font-size: 13px;">
                <i class="fas fa-arrow-left"></i> Voltar ao Dashboard
            </a>
        </div>

        <div class="card" style="max-width: 600px; margin: 0 auto; border-top: 4px solid #7b1fa2;">
            <h3 id="titulo-pagina" style="color: #7b1fa2; margin-bottom: 25px;">
                <i class="fas fa-user-plus"></i> Novo Usuário do Sistema
            </h3>

            <form id="form-registro">
                
                <div class="form-group" style="margin-bottom: 25px; text-align: center; border: 2px dashed #e0e0e0; padding: 20px; border-radius: 8px; background-color: #fafafa;">
                    <label for="foto-perfil" style="cursor: pointer; display: block; margin: 0;">
                        <img id="preview-foto" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23cccccc'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>" alt="Preview" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #7b1fa2; margin-bottom: 10px; background-color: #fff;">
                        <br>
                        <span style="color: #7b1fa2; font-weight: bold; font-size: 14px;"><i class="fas fa-camera"></i> Clique para escolher a foto</span>
                    </label>
                    <input type="file" id="foto-perfil" class="form-control" accept="image/*" style="display: none;">
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" placeholder="Ex: João Silva" required>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label>E-mail Corporativo</label>
                    <input type="email" id="email" placeholder="Ex: joao@seguradora.com" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Senha de Acesso</label>
                        <input type="password" id="senha" placeholder="******">
                        <small id="dica-senha" style="color:#666; display:none;">Deixe em branco para manter a senha atual.</small>
                    </div>
                    <div class="form-group">
                        <label>Perfil de Acesso</label>
                        <select id="tipo">
                            <option value="padrao">Padrão Básico</option>
                            <option value="admin">Administrador</option>
                            <option value="ti">Suporte</option> 
                        </select>
                    </div>
                </div>

                <button type="submit" id="btn-salvar" class="btn-novo" style="background-color: #7b1fa2; margin-top: 20px; width: 100%; padding: 12px; font-size: 16px;">
                    CADASTRAR USUÁRIO
                </button>
            </form>
        </div>
        <div class="system-credits" style="text-align: center;">By Áidano Lima - ASL TECH</div>
    </div>

    <script>
        const BASE_API = (typeof API_URL !== 'undefined') ? API_URL : 'https://seguradoraproject.onrender.com';
        const token = localStorage.getItem('token');
        const tipoUsuarioLogado = localStorage.getItem('tipo_usuario'); 
        
        const urlParams = new URLSearchParams(window.location.search);
        const idEdicao = urlParams.get('id');

        if (!token) window.location.href = 'index.html';

        const isMaster = (tipoUsuarioLogado === 'admin' || tipoUsuarioLogado === 'ti');

        if (!isMaster && !idEdicao) {
            Swal.fire({
                icon: 'warning', title: 'Acesso Restrito', text: 'Seu perfil permite apenas editar seus próprios dados.',
                confirmButtonColor: '#7b1fa2', confirmButtonText: 'Voltar ao Painel', allowOutsideClick: false
            }).then(() => { window.location.href = 'dashboard.html'; });
            throw new Error("Acesso negado.");
        }
        
        const nomeLogado = localStorage.getItem('usuario_logado');
        if(document.getElementById('user-name-display') && nomeLogado) 
            document.getElementById('user-name-display').innerText = nomeLogado.split(' ')[0];

        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.clear(); window.location.href = 'index.html';
        });

        if (!isMaster) {
            const selectTipo = document.getElementById('tipo');
            selectTipo.innerHTML = '<option value="padrao">Padrão (Visualizar)</option>';
            selectTipo.disabled = true; 
        }

        // --- PREVIEW DA FOTO LOCAL ---
        let urlFotoSalva = null; 
        const placeholderImg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23cccccc'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>";

        document.getElementById('foto-perfil').addEventListener('change', function(e) {
            const preview = document.getElementById('preview-foto');
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
            } else {
                preview.src = urlFotoSalva ? urlFotoSalva : placeholderImg;
            }
        });

        if (idEdicao) prepararModoEdicao();

        async function prepararModoEdicao() {
            document.getElementById('titulo-pagina').innerHTML = '<i class="fas fa-user-edit"></i> Editar Usuário';
            document.getElementById('btn-salvar').innerText = "SALVAR ALTERAÇÕES";
            document.getElementById('senha').required = false; 
            document.getElementById('senha').placeholder = "(Não alterada)";
            document.getElementById('dica-senha').style.display = 'block';

            try {
                const res = await fetch(`${BASE_API}/usuarios/${idEdicao}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if(!res.ok) throw new Error("Erro ao buscar usuário");
                const user = await res.json();
                
                document.getElementById('nome').value = user.nome;
                document.getElementById('email').value = user.email;
                
                if (user.url_foto) {
                    urlFotoSalva = user.url_foto;
                    document.getElementById('preview-foto').src = urlFotoSalva;
                }
                if (isMaster) document.getElementById('tipo').value = user.tipo;

            } catch (error) { Swal.fire('Erro', 'Não foi possível carregar os dados.', 'error'); }
        }

        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSalvar = document.getElementById('btn-salvar');
            const textoOriginal = btnSalvar.innerText;
            btnSalvar.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
            btnSalvar.disabled = true;

            try {
                const inputFoto = document.getElementById('foto-perfil');
                let urlFotoFinal = urlFotoSalva;

                if (inputFoto.files.length > 0) {
                    Swal.fire({ title: 'Enviando foto...', text: 'Aguarde...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    
                    const formData = new FormData();
                    formData.append('foto', inputFoto.files[0]);

                    const uploadRes = await fetch(`${BASE_API}/api/upload-perfil`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });

                    const uploadData = await uploadRes.json();
                    if (uploadRes.ok) {
                        urlFotoFinal = uploadData.url;
                    } else {
                        throw new Error(uploadData.message || "Falha ao enviar a foto.");
                    }
                }

                Swal.fire({ title: 'Salvando dados...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                const dados = {
                    nome: document.getElementById('nome').value,
                    email: document.getElementById('email').value,
                    senha: document.getElementById('senha').value,
                    tipo: document.getElementById('tipo').value,
                    url_foto: urlFotoFinal 
                };

                const endpoint = idEdicao ? `${BASE_API}/usuarios/${idEdicao}` : `${BASE_API}/registrar`;
                const method = idEdicao ? 'PUT' : 'POST';

                const res = await fetch(endpoint, {
                    method: method,
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(dados)
                });

                if (res.ok) {
                    await Swal.fire('Sucesso!', idEdicao ? 'Dados atualizados.' : 'Usuário cadastrado.', 'success');
                    window.location.href = 'dashboard.html';
                } else {
                    const err = await res.json();
                    throw new Error(err.message);
                }
            } catch (error) {
                Swal.fire('Erro', error.message, 'error');
            } finally {
                btnSalvar.innerHTML = textoOriginal;
                btnSalvar.disabled = false;
            }
        });
    </script>
</body>
</html>
